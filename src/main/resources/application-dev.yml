spring:
  # Dev overrides
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  # Dev Flyway
  flyway:
    clean-disabled: false

# Dev Logging
logging:
  level:
    com.ailearning.platform: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
