<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    @page {
      size: A4 landscape;
      margin: 0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 297mm;
      height: 210mm;
      background-color: #1e1b4b;
      font-family: 'DejaVu Sans', Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    .page {
      width: 297mm;
      height: 210mm;
      position: relative;
      background-color: #1e1b4b;
      overflow: hidden;
    }

    /* ── Borders: use explicit width/height — right/bottom ignored by OpenHTML ── */
    .border-outer {
      position: absolute;
      top: 7mm; left: 7mm;
      width: 283mm;
      height: 196mm;
      border: 2pt solid #d4af37;
    }

    .border-inner {
      position: absolute;
      top: 10mm; left: 10mm;
      width: 277mm;
      height: 190mm;
      border: 0.5pt solid rgba(212,175,55,0.35);
    }

    /* ── Corners: top/left only (no right/bottom) ── */
    .corner { position: absolute; width: 6mm; height: 6mm; }
    .corner-tl { top: 12mm; left: 12mm;
      border-top: 1.5pt solid #d4af37; border-left: 1.5pt solid #d4af37; }
    .corner-tr { top: 12mm; left: 279mm;
      border-top: 1.5pt solid #d4af37; border-right: 1.5pt solid #d4af37; }
    .corner-bl { top: 192mm; left: 12mm;
      border-bottom: 1.5pt solid #d4af37; border-left: 1.5pt solid #d4af37; }
    .corner-br { top: 192mm; left: 279mm;
      border-bottom: 1.5pt solid #d4af37; border-right: 1.5pt solid #d4af37; }

    /* ── Vertical centering via display:table ── */
    .content-wrapper {
      position: absolute;
      top: 0; left: 0;
      width: 297mm;
      height: 182mm;
      display: table;
    }

    .content-cell {
      display: table-cell;
      vertical-align: middle;
      text-align: center;
      padding: 0 25mm;
    }

    .platform-name {
      font-size: 7.5pt;
      font-weight: bold;
      color: #d4af37;
      letter-spacing: 5pt;
      text-transform: uppercase;
    }

    .header-rule {
      width: 45mm;
      height: 0.5pt;
      background-color: #d4af37;
      margin: 3mm auto 5mm;
    }

    /* ── CSS-only award badge (circle + ribbon tails) ── */
    .award-circle {
      width: 13mm;
      height: 13mm;
      border: 2pt solid #d4af37;
      border-radius: 50%;
      margin: 0 auto;
    }

    .award-ribbon-left {
      display: inline-block;
      width: 0;
      height: 0;
      border-left: 3.5mm solid transparent;
      border-right: 2mm solid #d4af37;
      border-top: 5mm solid #d4af37;
      margin-right: 0;
      vertical-align: top;
    }

    .award-ribbon-right {
      display: inline-block;
      width: 0;
      height: 0;
      border-right: 3.5mm solid transparent;
      border-left: 2mm solid #d4af37;
      border-top: 5mm solid #d4af37;
      vertical-align: top;
    }

    .award-ribbon-gap {
      display: inline-block;
      width: 2mm;
    }

    .cert-title {
      font-size: 26pt;
      font-weight: bold;
      color: #ffffff;
      letter-spacing: 0.5pt;
      margin-top: 4mm;
    }

    .presents-text {
      font-size: 9.5pt;
      color: #a5b4fc;
      font-style: italic;
      margin-top: 5mm;
    }

    .student-name {
      font-size: 30pt;
      font-weight: bold;
      color: #d4af37;
      margin-top: 3mm;
    }

    .name-rule {
      width: 80mm;
      height: 0.5pt;
      background-color: rgba(212,175,55,0.6);
      margin: 2mm auto;
    }

    .completed-text {
      font-size: 9.5pt;
      color: #a5b4fc;
      font-style: italic;
      margin-top: 2mm;
    }

    .course-title {
      font-size: 18pt;
      font-weight: bold;
      color: #ffffff;
      margin-top: 3mm;
    }

    .award-note {
      font-size: 7.5pt;
      color: #818cf8;
      font-style: italic;
      margin-top: 4mm;
    }

    /* ── Footer ── */
    .footer {
      position: absolute;
      bottom: 0; left: 0;
      width: 297mm;
      height: 28mm;
    }

    .footer-rule {
      height: 0.4pt;
      background-color: rgba(255,255,255,0.08);
      margin: 0 20mm 4mm;
    }

    .footer-left {
      position: absolute;
      left: 20mm;
      bottom: 9mm;
      text-align: left;
    }

    .footer-right {
      position: absolute;
      right: 20mm;
      bottom: 9mm;
      text-align: right;
    }

    .footer-center {
      position: absolute;
      left: 138.5mm;
      bottom: 5mm;
    }

    .footer-label {
      font-size: 6pt;
      color: #818cf8;
      text-transform: uppercase;
      letter-spacing: 1pt;
      margin-bottom: 1mm;
    }

    .footer-value {
      font-size: 9pt;
      color: #e0e7ff;
      font-weight: bold;
    }

    .footer-url {
      font-size: 6pt;
      color: #6366f1;
      margin-top: 1mm;
    }

    .seal {
      width: 16mm;
      height: 16mm;
      border: 1.5pt solid #d4af37;
      border-radius: 50%;
      text-align: center;
    }

    .seal-inner {
      font-size: 5.5pt;
      font-weight: bold;
      color: #d4af37;
      letter-spacing: 0.5pt;
      line-height: 16mm;
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Borders (explicit width/height) -->
  <div class="border-outer"></div>
  <div class="border-inner"></div>

  <!-- Corners (top/left coordinates only) -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Main content — vertically centred via display:table -->
  <div class="content-wrapper">
    <div class="content-cell">

      <div class="platform-name">AI Learning Platform</div>
      <div class="header-rule"></div>

      <!-- Award badge: circle with ribbon tails below -->
      <div class="award-circle"></div>
      <div style="margin-top:1mm;">
        <span class="award-ribbon-left"></span>
        <span class="award-ribbon-gap"></span>
        <span class="award-ribbon-right"></span>
      </div>

      <div class="cert-title">Certificate of Completion</div>

      <div class="presents-text">This certifies that</div>

      <div class="student-name" th:text="${studentName}">Student Name</div>
      <div class="name-rule"></div>

      <div class="completed-text">has successfully completed</div>

      <div class="course-title" th:text="${courseTitle}">Course Title</div>

      <div class="award-note">Awarded for excellence in learning and dedication to mastery</div>

    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-rule"></div>

    <div class="footer-left">
      <div class="footer-label">Date of Issue</div>
      <div class="footer-value" th:text="${issuedDate}">January 1, 2026</div>
    </div>

    <div class="footer-center">
      <div class="seal">
        <div class="seal-inner">VERIFIED</div>
      </div>
    </div>

    <div class="footer-right">
      <div class="footer-label">Certificate ID</div>
      <div class="footer-value" th:text="${verificationCode}">xxxxxxxx-xxxx</div>
      <div class="footer-url" th:text="${verificationUrl}">https://example.com/certificates/...</div>
    </div>
  </div>

</div>
</body>
</html>
